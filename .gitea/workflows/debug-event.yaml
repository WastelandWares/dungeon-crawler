name: Debug Event
on:
  issues:
    types: [labeled]

jobs:
  debug:
    runs-on: self-hosted
    steps:
      - name: Dump event
        shell: bash
        run: |
          echo "EVENT_NAME: $GITHUB_EVENT_NAME"
          echo "EVENT_PATH: $GITHUB_EVENT_PATH"
          if [ -f "$GITHUB_EVENT_PATH" ]; then
            echo "=== EVENT JSON ==="
            cat "$GITHUB_EVENT_PATH" | python3 -m json.tool 2>/dev/null || cat "$GITHUB_EVENT_PATH"
          else
            echo "No event file found"
          fi
